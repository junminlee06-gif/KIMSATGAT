<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>삿갓유람</title>
<style>
html,body{margin:0;height:100%;background:#140d08;color:#ead9bd;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center}.box{width:min(560px,88vw);border:2px solid #6d5132;background:#2b1d12;padding:24px;box-shadow:0 12px 0 rgba(0,0,0,.25)}h1{font-size:24px;margin:0 0 10px;color:#d7b66e}.bar{height:12px;border:1px solid #7a5b38;background:#120c07;overflow:hidden}.bar i{display:block;height:100%;width:0;background:#c8964f}.msg{font-size:14px;color:#c8b28c;margin-top:10px;line-height:1.5}code{color:#f0cc86}
</style>
</head>
<body>
<div class="box"><h1>삿갓유람 불러오는 중</h1><div class="bar"><i id="p"></i></div><div class="msg" id="msg">한지 조각을 이어 붙이는 중입니다.</div></div>
<script>
(async()=>{
  const count=8;
  const files=Array.from({length:count},(_,i)=>`chunks/game${String(i).padStart(2,'0')}.b64`);
  const p=document.getElementById('p');
  const msg=document.getElementById('msg');
  try{
    let b64='';
    for(let i=0;i<files.length;i++){
      const res=await fetch(files[i],{cache:'no-store'});
      if(!res.ok) throw new Error(`${files[i]} 로드 실패: ${res.status}`);
      b64+=await res.text();
      p.style.width=Math.round(((i+1)/files.length)*100)+'%';
      msg.textContent=`한지 조각 ${i+1}/${files.length} 이어 붙이는 중...`;
    }
    b64=b64.replace(/\s+/g,'');
    const bin=atob(b64);
    const gz=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) gz[i]=bin.charCodeAt(i);
    if(!('DecompressionStream' in window)) throw new Error('이 브라우저는 gzip 해제를 지원하지 않습니다. 최신 브라우저로 열어 주세요.');
    const stream=new Blob([gz]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    console.error(err);
    msg.innerHTML='게임 파일을 불러오지 못했습니다.<br><code>'+String(err.message).replace(/[<>&]/g,s=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[s]))+'</code><br>GitHub Pages 배포가 끝난 뒤 새로고침해 주세요.';
  }
})();
</script>
</body>
</html>
