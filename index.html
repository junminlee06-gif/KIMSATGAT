*{box-sizing:border-box}

canvas{display:block;width:720px;height:480px;image-rendering:auto;background:#0b1110;filter:saturate(.96) brightness(1.02) contrast(1.03)}
.hud{position:absolute;left:10px;top:10px;min-width:315px;background:rgba(12,16,18,.84);border:1px solid rgba(255,255,255,.16);padding:8px 10px;font-size:13px;z-index:2}.hud b{color:var(--accent)}

.toast{position:absolute;left:50%;top:54px;transform:translateX(-50%);display:none;background:#15191e;border:1px solid var(--accent);color:#f7e8c9;padding:8px 12px;font-size:13px;z-index:6;max-width:640px;text-align:center}
.dialog{position:absolute;left:16px;right:16px;bottom:16px;display:none;background:rgba(18,22,28,.98);border:2px solid #4d5867;box-shadow:0 8px 26px rgba(0,0,0,.55);padding:14px;z-index:5}.speaker{font-weight:800;color:var(--accent);margin-bottom:6px}.text{white-space:pre-wrap;font-size:15px;margin-bottom:10px}.options{display:grid;gap:7px}

aside{display:flex;flex-direction:column;gap:12px}.card{background:var(--panel);border:1px solid var(--line);padding:12px}.card h2{font-size:16px;margin:0 0 8px;color:var(--accent)}.small{font-size:12px;color:var(--muted)}ul{margin:6px 0 0 18px;padding:0}li{margin:3px 0;font-size:13px}.meters{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px}.meter{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:3px}.pill{display:inline-block;border:1px solid var(--line);padding:2px 6px;margin:2px 2px 0 0;font-size:12px;color:var(--muted)}

body{background:#0b0907;background-image:radial-gradient(circle at 50% 0%,#2a2118,#100d0a 60%,#050403 100%)}

.cutcaption{position:absolute;left:24px;right:24px;bottom:24px;z-index:2;border:2px solid #5b4a38;background:rgba(31,25,20,.96);padding:13px 15px;box-shadow:0 8px 0 rgba(0,0,0,.30),0 18px 34px rgba(0,0,0,.55)}

.cutNext{position:absolute;right:24px;bottom:24px;z-index:4;min-width:86px;text-align:center;background:#6b4e2f;border:2px solid #c39b62;color:#fff0d0;font-weight:800;box-shadow:0 5px 0 rgba(0,0,0,.35);animation:nextPulse 1.4s ease-in-out infinite}
.cutNext:hover,.cutNext:focus{background:#805f39;outline:2px solid #ead09c}
@keyframes nextPulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.cutactor{position:absolute;z-index:2;width:30px;height:42px;left:0;top:0;filter:drop-shadow(4px 6px 0 rgba(0,0,0,.34));animation:actorMove 1.35s ease-out forwards;animation-delay:var(--delay,0s);opacity:0;transform:translate(var(--sx),var(--sy)) scale(var(--scale,1))}
.cutactor:before{content:"";position:absolute;left:7px;top:2px;width:16px;height:14px;border:2px solid #1c120b;background:#d0a870;border-radius:8px 8px 6px 6px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.12)}
.cutactor:after{content:"";position:absolute;left:5px;top:16px;width:20px;height:20px;border:2px solid #1c120b;background:#445c63;border-radius:5px 5px 4px 4px;box-shadow:inset 0 -4px 0 rgba(0,0,0,.18)}
.cutactor .leg{position:absolute;top:35px;width:7px;height:8px;background:#28201a;border:2px solid #1c120b}.cutactor .l1{left:6px}.cutactor .l2{right:6px}
.cutactor .arm{position:absolute;top:19px;width:6px;height:13px;background:#d0a870;border:2px solid #1c120b}.cutactor .a1{left:0;transform:rotate(13deg)}.cutactor .a2{right:0;transform:rotate(-13deg)}
.cutactor.player:after{background:#3f5965}.cutactor.haeru:after{background:#53625e}.cutactor.chief:after{background:#7a4d3a}.cutactor.shaman:after{background:#393331}.cutactor.wolseon:after{background:#6d4a58}.cutactor.hunter:after{background:#463424}.cutactor.child{--scale:.78}.cutactor.child:after{background:#5e6f80}.cutactor.shadow:before{background:#151716;border-color:#090807}.cutactor.shadow:after{background:#101211;border-color:#090807}.cutactor .hair{position:absolute;left:5px;top:0;width:20px;height:8px;background:#211712;border:2px solid #1c120b;border-radius:9px 9px 3px 3px;z-index:1}.cutactor.child .hair{background:#33221a}
@keyframes actorMove{0%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(var(--scale,1))}18%{opacity:1}72%{opacity:1;transform:translate(var(--ex),var(--ey)) scale(var(--scale,1))}100%{opacity:1;transform:translate(var(--ex),var(--ey)) scale(var(--scale,1))}}
.cutpiece{animation:paperJolt 1.2s ease-out both}.cutpiece:nth-of-type(odd){animation-delay:.08s}.cutpiece:nth-of-type(even){animation-delay:.18s}
@keyframes paperJolt{0%{opacity:0;transform:translateY(8px) rotate(-6deg)}50%{opacity:1}100%{opacity:.95}}

function makeCutActor(a){
  const [kind,sx,sy,ex,ey,delay]=a;
  const d=document.createElement('div'); d.className='cutactor '+kind;
  d.style.setProperty('--sx',sx+'px'); d.style.setProperty('--sy',sy+'px');
  d.style.setProperty('--ex',ex+'px'); d.style.setProperty('--ey',ey+'px'); d.style.setProperty('--delay',(delay||0)+'s');
  d.innerHTML='<span class="hair"></span><span class="arm a1"></span><span class="arm a2"></span><span class="leg l1"></span><span class="leg l2"></span>';
  return d;
}
function playCutscene(id,next){
  const cs=cutscenes[id]; if(!cs){next();return;}
  state.mode='cutscene'; state.dialogOpen=false; keysDown.clear(); pressed.clear(); dom.dialog.style.display='none';
  dom.cutscene.style.display='block'; dom.cutscene.style.setProperty('--cx',cs.cx||'50%'); dom.cutscene.style.setProperty('--cy',cs.cy||'52%');
  dom.cutTitle.textContent=cs.title; dom.cutText.textContent=cs.text;
  [...dom.cutscene.querySelectorAll('.cutpiece,.cutactor')].forEach(e=>e.remove());
  (cs.pieces||[]).forEach((p,i)=>{const d=document.createElement('div');d.className='cutpiece '+p[0];d.style.left=p[1]+'px';d.style.top=p[2]+'px';d.style.width=p[3]+'px';d.style.height=p[4]+'px';d.style.transform='rotate('+(-5+i*3)+'deg)';dom.cutscene.appendChild(d);});
  actorDataForCutscene(id).forEach(a=>dom.cutscene.appendChild(makeCutActor(a)));
  const finish=()=>{dom.cutscene.style.display='none';dom.cutNext.onclick=null;state.mode='walk';if(next)next();};
  dom.cutNext.onclick=finish; dom.cutNext.focus({preventScroll:true});
}

function showScene(id,override){
  const sc=scenes[id]; if(!sc){console.error('missing scene',id);return;}
  state.mode='dialog'; state.dialogOpen=true; keysDown.clear(); pressed.clear();
  dom.speaker.textContent=typeof sc.speaker==='function'?sc.speaker():sc.speaker;
  const sceneText=typeof sc.text==='function'?sc.text():sc.text;
  const sceneOptions=typeof sc.options==='function'?sc.options():sc.options;
  dom.text.textContent=override!==undefined?override:sceneText;
  dom.options.innerHTML='';
  sceneOptions.forEach((op,i)=>{const b=document.createElement('button');b.textContent=(i+1)+'. '+op[0];b.onclick=op[1];dom.options.appendChild(b);});
  dom.dialog.style.display='block'; refreshSide();
}
function closeDialog(){state.dialogOpen=false;dom.dialog.style.display='none';if(state.mode!=='battle')state.mode='walk';keysDown.clear();pressed.clear();refreshSide();}
function toast(msg){dom.toast.textContent=msg;dom.toast.style.display='block';clearTimeout(toast.timer);toast.timer=setTimeout(()=>dom.toast.style.display='none',1350);}

function pay(n){if(state.player.coins<n){toast('전이 부족하다.');return false;}state.player.coins-=n;refreshSide();return true;}
function addItem(name,n){state.inventory[name]=(state.inventory[name]||0)+n;refreshSide();}
function useItem(name,n=1){if((state.inventory[name]||0)<n){toast(name+'이 부족하다.');return false;}state.inventory[name]-=n;if(state.inventory[name]<=0)delete state.inventory[name];refreshSide();return true;}
function currentWeapon(){return weaponDefs[state.weapon]||weaponDefs.staff;}
function weaponShopText(){
  const head='무기마다 Q 기본 공격의 범위, 쿨타임, 이펙트가 달라진다. 이번 버전에서는 쿨타임을 길게 조정했고, 머리 위 타이머로 재사용 가능 시간을 확인한다. 필드 Space 대쉬+상호작용, E 스킬, R 포획 입력을 기준으로 조정했다.';
  const lines=Object.entries(weaponDefs).map(([id,w])=>{
    const mark=state.weapon===id?'▶ ':'  ';
    const own=state.weapons[id]?'[보유]':'['+w.cost+'전]';
    return mark+w.name+' '+own+'\n   범위 '+w.range+' / 쿨타임 '+(w.cooldown/1000).toFixed(2)+'초 / 공격 +'+w.atk+' · '+w.desc;
  });
  return head+'\n\n'+lines.join('\n\n');
}
function buyOrEquipWeapon(id){
  const w=weaponDefs[id]; if(!w)return;
  if(!state.weapons[id]){if(!pay(w.cost)){showScene('weaponShop');return;}state.weapons[id]=true;toast(w.name+' 구매');}
  state.weapon=id;toast(w.name+' 장착');refreshSide();showScene('weaponShop');
}
function prostheticText(){
  const head='보강구는 한 번 장착하면 영구적으로 스펙을 강화한다. 검은 장부, 붉은 인장, 나무 관절, 연철 장식을 한지풍으로 정리했다.';
  const lines=Object.entries(prostheticDefs).map(([id,g])=>{
    const mark=state.prosthetics[id]?'■ 장착':'□ 미장착';
    const price=state.prosthetics[id]?'':'['+g.cost+'전]';
    return mark+' '+g.name+' '+price+'\n   '+g.desc;
  });
  return head+'\n\n'+lines.join('\n\n');
}
function installProsthetic(id){
  const g=prostheticDefs[id],p=state.player;if(!g)return;
  if(state.prosthetics[id]){toast('이미 장착한 의체다.');showScene('prostheticShop');return;}
  if(!pay(g.cost)){showScene('prostheticShop');return;}
  state.prosthetics[id]=true;
  if(g.atk)p.atk+=g.atk;if(g.def)p.def+=g.def;if(g.maxHp){p.maxHp+=g.maxHp;p.hp+=g.maxHp;}if(g.maxSp){p.maxSp+=g.maxSp;p.sp+=g.maxSp;}if(g.moveBonus)p.moveBonus=(p.moveBonus||0)+g.moveBonus;if(g.crit)p.crit=(p.crit||0)+g.crit;if(g.capBonus)p.capBonus=(p.capBonus||0)+g.capBonus;
  toast(g.name+' 장착 완료');refreshSide();showScene('prostheticShop');
}
function setPlayerPos(x,y){
  const p=state.player;
  p.x=x;p.y=y;p.rx=x;p.ry=y;
  p.walkDashT=0;p.walkDashVX=0;p.walkDashVY=0;p.dashTrail=[];
}
function respawnMapEnemies(map){
  const arr=enemies[map]||[];
  let n=0;
  for(const e of arr){
    const temp=enemyTemplates[e.type];
    if(temp && !temp.boss && state.defeated[e.id]){delete state.defeated[e.id];n++;}
  }
  return n;
}
function goMap(map,x,y){
  const from=state.map;
  state.map=map;setPlayerPos(x,y);keysDown.clear();pressed.clear();
  const respawned = from!==map ? respawnMapEnemies(map) : 0;
  toast(mapName()+'로 이동'+(respawned?` · 환상동물 ${respawned}마리 리젠`:''));
  refreshSide();
}
function proceedAfterCh1(){
  state.chapter=2;
  state.phase='ch2_day';
  state.questStage=Math.max(state.questStage,3);
  state.flags.ending=false;
  closeDialog();
  goMap('harbor',5.2,19.2);
  showScene('chapter2Start');
}
function goToHarborFromShrine(){
  state.chapter=Math.max(state.chapter||1,2);
  state.phase='ch2_day';
  state.questStage=Math.max(state.questStage,3);
  closeDialog();
  goMap('harbor',5.2,19.2);
  showScene('chapter2Start');
}
function mapName(){return state.map==='village'?'청산고을':state.map==='field'?'북쪽 들길':state.map==='market'?'동쪽 연철장터':state.map==='relay'?'금줄역참':state.map==='harbor'?'월영나루':state.map==='marsh'?'철등갯벌':state.map==='bamboo'?'비전죽림':state.map==='mine'?'적동광산':state.map==='foundry'?'강철 폐제련소':'폐서낭당';}
function chapterName(){
  if(state.steelSolved)return '외전 완료 · 강철이 기록';
  if(state.chapter>=2||state.bossSolved||state.questStage>=3)return '2장 월영나루 행';
  return '1장 청산고을 의뢰';
}
function questText(){
  if(state.steelSolved)return '확장 의뢰 완료: 강철이 기록됨';
  if(state.questStage===1)return `들길 환상동물 처리: ${state.processed}/2`;
  if(state.questStage===2)return '폐서낭당에서 안개여우 무호 대면';
  if((state.chapter>=2||state.bossSolved)&&state.questStage===3)return '월영나루에서 새 의뢰를 확인하고 철등갯벌로 이동';
  if(state.questStage>=4)return '확장 의뢰: 폐제련소의 강철이 대면';
  return '의뢰 확인';
}

function addCodex(enemy,result){
  const label=result==='capture'?'포획':result==='calm'?'진정':'퇴치';
  const key=enemy.name+' · '+label;
  if(!state.codex.some(x=>x.key===key)){
    state.codex.push({key, name:enemy.name, result:label, feature:enemy.feature, pattern:enemy.pattern});
  }
}
function refreshSide(){
  const p=state.player;
  const hp=Math.round(p.hp/p.maxHp*100), sp=Math.round(p.sp/p.maxSp*100), xp=Math.round(p.xp/p.next*100);
  const w=currentWeapon();
  const prost=Object.entries(prostheticDefs).filter(([id])=>state.prosthetics[id]).map(([,g])=>g.name).join(', ')||'미장착';
  dom.phaseText.textContent = mapName()+' / '+chapterName()+' / 한지 액션판';
  dom.meters.innerHTML = `<div class="meter"><span>레벨</span><b>${p.lv}</b></div><div class="meter"><span>공격/방어</span><b>${p.atk}/${p.def}</b></div><div class="meter"><span>무기</span><b>${esc(w.name)}</b></div><div class="meter"><span>무기 쿨타임</span><b>${(w.cooldown/1000).toFixed(2)}초</b></div><div class="battleStat"><span>체력</span><span class="bar"><i style="width:${hp}%"></i></span><b>${p.hp}/${p.maxHp}</b></div><div class="battleStat"><span>기력</span><span class="bar sp"><i style="width:${sp}%"></i></span><b>${p.sp}/${p.maxSp}</b></div><div class="battleStat"><span>경험</span><span class="bar xp"><i style="width:${xp}%"></i></span><b>${p.xp}/${p.next}</b></div><div class="meter"><span>엽전</span><b>${p.coins}</b></div>`;
  dom.questLog.innerHTML = `<li>${esc(questText())}</li><li class="small">장착 보강구: ${esc(prost)}</li><li class="small">전투: 큰 아레나+추적 카메라, Q 쿨타임 머리 위 표시</li><li class="small">새 맵: 월영나루 / 철등갯벌 / 비전죽림 / 적동광산 / 강철 폐제련소</li><li class="small">미니맵: 흰점=플레이어, 주홍=환수, 황토=출구/장소</li>`;
  const inv=Object.entries(state.inventory);
  dom.inventoryList.innerHTML = inv.length?inv.map(([k,v])=>`<li>${esc(k)} × ${v}</li>`).join('\n\n'):'<li class="small">비어 있음</li>';
  dom.codexList.innerHTML = state.codex.length?state.codex.map(v=>`<div class="rpgLine"><b>${esc(v.name)} · ${esc(v.result)}</b><br><span class="small">${esc(v.feature)}</span></div>`).join('\n\n'):'<span class="small">아직 없음</span>';
}

function nearbyLocation(){
  const p=state.player; let best=null,bestD=99;
  for(const loc of (locations[state.map]||[])){
    const d=dist(p.x,p.y,loc.x,loc.y);
    if(d<(loc.radius||1.4)&&d<bestD){best=loc;bestD=d;}
  }
  for(const e of activeEnemies()){
    const d=dist(p.x,p.y,e.x,e.y);
    if(d<1.8&&d<bestD){best={id:e.id,name:enemyTemplates[e.type].name,type:'enemy',enemy:e,x:e.x,y:e.y};bestD=d;}
  }
  return best;
}
function interact(){
  if(state.mode!=='walk')return;
  const loc=nearbyLocation();
  if(!loc){toast('상호작용할 대상이 없다.');return;}
  if(loc.type==='enemy')startBattle(loc.enemy.id);
  else if(loc.scene)showScene(loc.scene);
  else if(loc.run)loc.run();
}

function startBoss(){playCutscene('boss',()=>showScene('bossIntro'));}
function startSteelBoss(){playCutscene('steel',()=>showScene('steelBossIntro'));}
function findEnemyInst(instanceId){for(const arr of Object.values(enemies)){const found=arr.find(e=>e.id===instanceId);if(found)return found;}return null;}
function startBattle(instanceId){
  const inst=findEnemyInst(instanceId); if(!inst||state.defeated[instanceId])return;
  const base=enemyTemplates[inst.type];
  // 화면보다 큰 전투장. drawBattle()에서 카메라가 김삿갓을 따라간다.
  const arena={x:0,y:0,w:1040,h:640};
  const view={x:28,y:66,w:664,h:350};
  state.battle={
    instance:inst,
    enemy:{...base,hp:base.maxHp,x:arena.x+arena.w*.72,y:arena.y+arena.h*.44,vx:0,vy:0,ai:0,state:'idle',stateT:0,slow:0,hitFlash:0},
    px:arena.x+arena.w*.28, py:arena.y+arena.h*.60, pdir:0,
    arena, view, camX:0, camY:0, calm:0, timer:0, actionCD:{attack:0,poem:0,net:0,dash:0,drink:0,talisman:0}, dashT:0, dashVX:0, dashVY:0,
    projectiles:[], dangers:[], hitboxes:[], puddles:[], slashes:[], texts:[], log:[`${base.name}이 전장에 들어왔다.`], result:null
  };
  state.mode='battle'; state.dialogOpen=false; dom.dialog.style.display='none'; keysDown.clear(); pressed.clear();
  toast('확장 전투장 진입: '+base.name);
  refreshSide();
}

function battleLog(msg){const b=state.battle;if(b){b.log.push(msg);if(b.log.length>8)b.log.shift();}}
function addFloat(text,x,y,color='#ead09c'){const b=state.battle;if(b)b.texts.push({text,x,y,vy:-18,life:850,max:850,color});}
function playerCenter(){const b=state.battle;return {x:b.px,y:b.py};}
function enemyCenter(){const b=state.battle;return {x:b.enemy.x,y:b.enemy.y};}

function battlePlayerAction(name){
  const b=state.battle,p=state.player; if(!b||b.finishing)return;
  if(name==='attack'){
    if(b.actionCD.attack>0)return;
    const w=currentWeapon();
    b.actionCD.attack=w.cooldown; b.attackMax=w.cooldown;
    const ang=b.pdir, reach=w.reach+(p.reachBonus||0), range=w.range+(p.rangeBonus||0);
    const x=b.px+Math.cos(ang)*reach, y=b.py+Math.sin(ang)*reach;
    let dmg=Math.max(3,p.atk+w.atk+Math.floor(Math.random()*5)-b.enemy.def);
    if((p.crit||0)>0 && chance(p.crit)){dmg=Math.floor(dmg*1.55);b.slashes.push({kind:'impact',x:b.px+Math.cos(ang)*42,y:b.py+Math.sin(ang)*42,ang,life:260,max:260,r:38,crit:true});}
    const hit=dist(x,y,b.enemy.x,b.enemy.y)<range;
    b.slashes.push({kind:'basic',weapon:state.weapon,style:w.style,x,y,ang,life:340,max:340,r:Math.max(112,range-14),hit,color1:w.color1,color2:w.color2});
    if(hit){
      damageEnemy(dmg,'slash');
      p.sp=clamp(p.sp+1,0,p.maxSp);
      addFloat('-'+dmg,b.enemy.x,b.enemy.y-30,w.color1||'#fff0bc');
      b.slashes.push({kind:'impact',x:b.enemy.x,y:b.enemy.y-6,ang,life:340,max:340,r:w.style==='lightning'?70:58,color1:w.color1,color2:w.color2});
      if(w.calm){b.calm=clamp(b.calm+w.calm,0,b.enemy.calmGoal);addFloat('진정 +'+w.calm,b.enemy.x,b.enemy.y-46,'#bdd3cf');}
      if(w.slow)b.enemy.slow=Math.max(b.enemy.slow,w.slow);
      if(w.shock){for(let off of [-.22,.22])b.projectiles.push({kind:'spark',x:b.enemy.x,y:b.enemy.y,vx:Math.cos(ang+Math.PI+off)*120,vy:Math.sin(ang+Math.PI+off)*120,r:5,life:420,damage:0});}
    }else{
      addFloat('빗나감',x,y,'#d8c7a1');
    }
  }else if(name==='poem'){
    if(b.actionCD.poem>0)return;
    if(p.sp<5){toast('기력이 부족하다.');return;}
    p.sp-=5; b.actionCD.poem=1550;
    b.slashes.push({x:b.px,y:b.py,ang:0,life:450,max:450,r:104,pulse:true});
    const near=dist(b.px,b.py,b.enemy.x,b.enemy.y)<116;
    const calmGain=near?18+p.lv*3:9+p.lv*2;
    b.calm=clamp(b.calm+calmGain,0,b.enemy.calmGoal);
    if(near){const dmg=5+p.lv+Math.floor(Math.random()*3);damageEnemy(dmg,'poem');addFloat('진정 +'+calmGain,b.enemy.x,b.enemy.y-45,'#bdd3cf');}
    else addFloat('진정 +'+calmGain,b.px,b.py-40,'#bdd3cf');
    if(b.calm>=b.enemy.calmGoal)finishBattle('calm');
  }else if(name==='net'){
    if(b.actionCD.net>0)return;
    if(!useItem('포획그물'))return;
    b.actionCD.net=1200;
    const d=dist(b.px,b.py,b.enemy.x,b.enemy.y);
    b.slashes.push({x:b.enemy.x,y:b.enemy.y,ang:0,life:380,max:380,r:68,net:true});
    let rate=b.enemy.capRate + (state.player.capBonus||0) + (1-b.enemy.hp/b.enemy.maxHp)*44 + (b.calm/b.enemy.calmGoal)*26 - Math.max(0,d-45)*0.45;
    if(b.enemy.boss)rate-=12;
    rate=clamp(rate,5,88);
    addFloat(Math.round(rate)+'%',b.enemy.x,b.enemy.y-48,'#ead09c');
    if(d<150 && chance(rate)){finishBattle('capture');return;}
    b.enemy.slow=900; battleLog('그물이 찢기거나 안개에 젖었다.');
  }else if(name==='dash'){
    if(b.actionCD.dash>0)return;
    b.actionCD.dash=820; b.dashT=220; state.player.invuln=360;
    let dx=0,dy=0;if(keysDown.has('left'))dx-=1;if(keysDown.has('right'))dx+=1;if(keysDown.has('up'))dy-=1;if(keysDown.has('down'))dy+=1;
    if(!dx&&!dy){dx=Math.cos(b.pdir);dy=Math.sin(b.pdir);}
    const len=Math.hypot(dx,dy)||1; b.dashVX=dx/len*360; b.dashVY=dy/len*360;
  }else if(name==='drink'){
    if(b.actionCD.drink>0)return;
    if(!useItem('막걸리'))return;
    b.actionCD.drink=5200;
    const heal=22+p.lv*6; p.hp=clamp(p.hp+heal,0,p.maxHp); p.sp=clamp(p.sp+7,0,p.maxSp);
    addFloat('회복 +'+heal,b.px,b.py-28,'#a8c09b');
  }else if(name==='talisman'){
    if(b.actionCD.talisman>0)return;
    if(!useItem('부적'))return;
    b.actionCD.talisman=900;
    const a=angleTo(b.px,b.py,b.enemy.x,b.enemy.y);
    b.projectiles.push({kind:'playerTalisman',x:b.px,y:b.py,vx:Math.cos(a)*300,vy:Math.sin(a)*300,r:8,life:1200,damage:16+p.lv*2});
  }else if(name==='run'){
    if(b.enemy.boss){toast('안개가 발목을 감아 도망칠 수 없다.');return;}
    state.mode='walk'; state.battle=null; keysDown.clear(); pressed.clear(); toast('전투에서 빠져나왔다.');
  }
  refreshSide();
}

function damageEnemy(amount,source){
  const b=state.battle;if(!b)return;
  b.enemy.hp=clamp(b.enemy.hp-amount,0,b.enemy.maxHp);
  b.enemy.stateT=Math.max(b.enemy.stateT,80);
  b.enemy.hitFlash=150;
  if(source==='poem')b.enemy.slow=Math.max(b.enemy.slow,280);
  if(b.enemy.hp<=0)finishBattle('defeat');
}
function damagePlayer(amount,source){
  const b=state.battle,p=state.player;if(!b||p.invuln>0)return;
  const dmg=Math.max(1,Math.floor(amount-p.def*.35));
  p.hp=clamp(p.hp-dmg,0,p.maxHp); p.invuln=760;
  addFloat('-'+dmg,b.px,b.py-30,'#d99b93');
  if(source)battleLog(source+' 피해를 입었다.');
  if(p.hp<=0){
    state.battle=null; state.mode='dialog'; dom.dialog.style.display='none'; showScene('gameOver');
  }
  refreshSide();
}

function finishBattle(result){
  const b=state.battle,p=state.player;if(!b||b.finishing)return;
  const e=b.enemy, label=result==='capture'?'포획':result==='calm'?'진정':'처치';
  b.finishing=true; b.result=result; e.state='vanish'; e.stateT=900; e.slow=9999; e.hitFlash=420;
  b.projectiles=[]; b.dangers=[]; b.hitboxes=[]; b.puddles=[];
  if(result==='defeat')e.hp=0;
  defeatBurst(result,label);
  setTimeout(()=>finalizeBattle(result),820);
}
function defeatBurst(result,label){
  const b=state.battle;if(!b)return;
  const e=b.enemy;
  const main=result==='defeat'?'#fff0b8':result==='capture'?'#d7b66e':'#a8ffbf';
  const sub=result==='defeat'?'#9a4034':result==='capture'?'#9a4034':'#d7b66e';
  b.texts.push({text:label,x:e.x,y:e.y-58,vy:-10,life:760,max:760,color:main});

function finalizeBattle(result){
  const b=state.battle,p=state.player;if(!b||!b.finishing)return;
  const e=b.enemy, label=result==='capture'?'포획':result==='calm'?'진정':'퇴치';
  state.defeated[b.instance.id]=result;
  addCodex(e,result);
  p.coins+=e.coins;
  const levelText=gainXp(e.xp);
  if(!e.boss){
    state.processed++;
    if(state.processed>=2 && state.questStage===1){
      state.questStage=2; state.bossUnlocked=true; p.coins+=20;

    toast('강철이 확장 의뢰 완료 · 추가 보상 38전');
  }else{
    state.bossSolved=true; state.chapter=2; state.phase='ch2_day'; state.questStage=3; state.flags.ending=true;
  }
  state.battle=null; state.mode='dialog'; dom.dialog.style.display='none';
  let text=`${e.name} ${label} 성공.
보상: 경험 ${e.xp}, 엽전 ${e.coins}

특징 기록: ${e.feature}
공격 습성: ${e.pattern}`;
  if(levelText)text+='\n\n'+levelText;
  if(e.boss)text += e.sprite==='gangcheori'?'\n\n강철 폐제련소의 쇳가루 비가 멎었다.':'\n\n청산고을의 안개가 걷혔다.';
  showScene('battleResult',text);
}

function gainXp(n){
  const p=state.player; p.xp+=n; let msg='';
  while(p.xp>=p.next){
    p.xp-=p.next; p.lv++; p.next+=12+p.lv*6; p.maxHp+=9; p.maxSp+=4; p.atk+=2; p.def+=1; p.hp=p.maxHp; p.sp=p.maxSp;
    msg+=`레벨 ${p.lv} 달성! 체력/기력/공격/방어가 올랐다.\n`;
  }
  refreshSide(); return msg.trim();
}

function updateBattle(dt){
  const b=state.battle,p=state.player;if(!b)return;
  const sec=dt/1000; b.timer+=dt; p.invuln=Math.max(0,p.invuln-dt);
  for(const k of Object.keys(b.actionCD))b.actionCD[k]=Math.max(0,b.actionCD[k]-dt);
  b.enemy.slow=Math.max(0,b.enemy.slow-dt);
  b.enemy.hitFlash=Math.max(0,(b.enemy.hitFlash||0)-dt);
  b.dashT=Math.max(0,b.dashT-dt);

  let dx=0,dy=0;if(keysDown.has('left'))dx-=1;if(keysDown.has('right'))dx+=1;if(keysDown.has('up'))dy-=1;if(keysDown.has('down'))dy+=1;
  const len=Math.hypot(dx,dy)||1;
  let spd=b.dashT>0?0:126+(p.moveBonus||0);
  if(b.dashT>0){b.px+=b.dashVX*sec;b.py+=b.dashVY*sec;} else if(dx||dy){b.px+=dx/len*spd*sec;b.py+=dy/len*spd*sec;b.pdir=Math.atan2(dy,dx);}
  b.px=clamp(b.px,b.arena.x+20,b.arena.x+b.arena.w-20); b.py=clamp(b.py,b.arena.y+24,b.arena.y+b.arena.h-20);

  if(!b.finishing)enemyAI(dt);
  updateObjects(dt);
  if(state.battle && b.calm>=b.enemy.calmGoal)finishBattle('calm');
}

function enemyAI(dt){
  const b=state.battle;if(!b)return;
  const e=b.enemy, p={x:b.px,y:b.py}; e.ai-=dt; e.stateT-=dt;
  const slow=e.slow>0?.45:1;
  if(e.state==='lunge'){
    e.x+=e.vx*dt/1000; e.y+=e.vy*dt/1000;
    if(dist(e.x,e.y,b.px,b.py)<20)damagePlayer(e.atk+4,e.name+'의 돌진');
    if(e.stateT<=0){e.state='idle';e.vx=0;e.vy=0;}
  }else if(e.state==='swoop'){
    e.x+=e.vx*dt/1000; e.y+=e.vy*dt/1000;
    if(dist(e.x,e.y,b.px,b.py)<24)damagePlayer(e.atk+5,e.name+'의 급강하');
    if(e.stateT<=0){e.state='idle';}
  }else{
    const d=dist(e.x,e.y,p.x,p.y);
    let desired=e.speed*slow*(e.boss&&e.hp<e.maxHp*.45?1.18:1);
    if(['bird','lantern','jelly','spider','wasp'].includes(e.sprite)&&d<155)desired=-desired*.7;
    if(['frog','crab','ore'].includes(e.sprite)&&d<95)desired=0;
    if(e.sprite==='stag'&&d>170)desired*=1.18;
    if(e.sprite==='serpent'&&d>150)desired*=1.12;
    if(e.sprite==='gangcheori'){if(d<112)desired=-desired*.32;else if(d>250)desired*=1.20;}
    if(e.boss&&d<85)desired=-desired*.35;
    const a=angleTo(e.x,e.y,p.x,p.y);
    e.x+=Math.cos(a)*desired*dt/1000; e.y+=Math.sin(a)*desired*dt/1000;
  }
  e.x=clamp(e.x,b.arena.x+30,b.arena.x+b.arena.w-30); e.y=clamp(e.y,b.arena.y+34,b.arena.y+b.arena.h-28);
  if(e.ai<=0 && e.state==='idle'){
    if(e.sprite==='rat')ratPattern();
    else if(e.sprite==='bird')birdPattern();
    else if(e.sprite==='frog')frogPattern();
    else if(e.sprite==='hound')houndPattern();
    else if(e.sprite==='blade')bladePattern();
    else if(e.sprite==='centipede')centipedePattern();
    else if(e.sprite==='lantern')lanternPattern();
    else if(e.sprite==='stag')stagPattern();
    else if(e.sprite==='jelly')jellyPattern();
    else if(e.sprite==='crab')crabPattern();
    else if(e.sprite==='wasp')waspPattern();
    else if(e.sprite==='spider')spiderPattern();
    else if(e.sprite==='serpent')serpentPattern();
    else if(e.sprite==='ore')orePattern();
    else if(e.sprite==='gangcheori')gangcheoriPattern();
    else foxPattern();
  }
}

function updateObjects(dt){
  const b=state.battle;if(!b)return;
  for(const hb of b.hitboxes){hb.life-=dt;if(!hb.hit&&hb.owner==='enemy'&&circleHitPlayer(hb.x,hb.y,hb.r)){damagePlayer(hb.damage,hb.label);hb.hit=true;}}
  b.hitboxes=b.hitboxes.filter(o=>o.life>0);
  for(const d of b.dangers){
    d.ttl-=dt;
    if(d.ttl<=0&&!d.fired){
      d.fired=true;
      if(d.kind==='circle'){
        if(circleHitPlayer(d.x,d.y,d.r))damagePlayer(d.damage,d.label);
        if(d.puddle)addPuddle({x:d.x,y:d.y,r:d.r*.72,life:2600,tick:0,damage:Math.max(2,Math.floor(d.damage*.45)),kind:'poison'});
      }else if(d.kind==='line'){
        if(lineHitPlayer(d.x,d.y,d.ang,d.len,d.w))damagePlayer(d.damage,d.label);
      }
    }
  }
  b.dangers=b.dangers.filter(d=>d.ttl>-160);
  for(const p of b.projectiles){
    p.x+=p.vx*dt/1000;p.y+=p.vy*dt/1000;p.life-=dt;
    if(p.kind==='spark'){continue;}
    if(p.kind==='playerTalisman'){
      if(dist(p.x,p.y,b.enemy.x,b.enemy.y)<p.r+30){damageEnemy(p.damage,'talisman');b.calm=clamp(b.calm+6,0,b.enemy.calmGoal);addFloat('-'+p.damage,b.enemy.x,b.enemy.y-36,'#f1d6a2');p.life=0;}
    }else{
      if(circleHitPlayer(p.x,p.y,p.r)){damagePlayer(p.damage,p.kind==='ember'?'괴불새 불씨':p.kind==='water'?'우물 물덩이':'무호 안개탄');p.life=0;}
    }
  }
  b.projectiles=b.projectiles.filter(p=>p.life>0&&p.x>b.arena.x-40&&p.x<b.arena.x+b.arena.w+40&&p.y>b.arena.y-40&&p.y<b.arena.y+b.arena.h+40);
  for(const p of b.puddles){
    p.life-=dt;p.tick-=dt;
    if(p.tick<=0&&circleHitPlayer(p.x,p.y,p.r)){damagePlayer(p.damage,'웅덩이');p.tick=460;}
  }
  b.puddles=b.puddles.filter(p=>p.life>0);
  for(const s of b.slashes)s.life-=dt;
  b.slashes=b.slashes.filter(s=>s.life>0);
  for(const tx of b.texts){tx.life-=dt;tx.y+=tx.vy*dt/1000;}
  b.texts=b.texts.filter(tx=>tx.life>0);
}
function circleHitPlayer(x,y,r){const b=state.battle;return b&&dist(x,y,b.px,b.py)<r+6;}
function lineHitPlayer(x,y,ang,len,w){
  const b=state.battle;if(!b)return false;
  const vx=b.px-x,vy=b.py-y, ux=Math.cos(ang),uy=Math.sin(ang);
  const proj=vx*ux+vy*uy; if(proj<0||proj>len)return false;
  const px=x+ux*proj,py=y+uy*proj;
  return dist(b.px,b.py,px,py)<w*.5+6;
}

function fieldDash(){
  if(state.mode!=='walk')return;
  const p=state.player;
  if((p.walkDashCD||0)>0)return;
  let dx=0,dy=0;
  if(keysDown.has('left'))dx-=1;if(keysDown.has('right'))dx+=1;if(keysDown.has('up'))dy-=1;if(keysDown.has('down'))dy+=1;
  if(!dx&&!dy){
    if(p.dir==='left')dx=-1;else if(p.dir==='right')dx=1;else if(p.dir==='up')dy=-1;else dy=1;
  }
  const len=Math.hypot(dx,dy)||1;
  p.dir=Math.abs(dx)>Math.abs(dy)?(dx<0?'left':'right'):(dy<0?'up':'down');
  p.walkDashCD=640;
  p.walkDashT=165;
  const dashSpeed=0.026+(p.moveBonus||0)*0.000045;
  p.walkDashVX=dx/len*dashSpeed;
  p.walkDashVY=dy/len*dashSpeed;
  if(!p.dashTrail)p.dashTrail=[];
  p.dashTrail.push({x:p.x,y:p.y,life:280,max:280});
}
function updateWalk(dt){
  const p=state.player;
  p.walkDashCD=Math.max(0,(p.walkDashCD||0)-dt);
  if(!p.dashTrail)p.dashTrail=[];
  for(const tr of p.dashTrail)tr.life-=dt;
  p.dashTrail=p.dashTrail.filter(tr=>tr.life>0);
  let dx=0,dy=0;if(keysDown.has('up'))dy-=1;if(keysDown.has('down'))dy+=1;if(keysDown.has('left'))dx-=1;if(keysDown.has('right'))dx+=1;
  if((p.walkDashT||0)>0){
    p.walkDashT=Math.max(0,p.walkDashT-dt);
    if(p.dashTrail.length<8)p.dashTrail.push({x:p.x,y:p.y,life:230,max:230});
    tryMove((p.walkDashVX||0)*dt,(p.walkDashVY||0)*dt);
    p.moving=true;
  }else if(dx||dy){
    const len=Math.hypot(dx,dy);dx/=len;dy/=len;const sp=dt*(0.0088+(p.moveBonus||0)*0.000055);tryMove(dx*sp,dy*sp);
    p.dir=Math.abs(dx)>Math.abs(dy)?(dx<0?'left':'right'):(dy<0?'up':'down');p.moving=true;
  }else p.moving=false;
  p.rx+=(p.x-p.rx)*0.45;p.ry+=(p.y-p.ry)*0.45;
}
function update(dt){
  if(state.mode==='walk')updateWalk(dt);
  else if(state.mode==='battle')updateBattle(dt);
}
function tryMove(dx,dy){const nx=state.player.x+dx,ny=state.player.y+dy;if(canStand(nx,state.player.y))state.player.x=nx;if(canStand(state.player.x,ny))state.player.y=ny;}
function canStand(x,y){const cx=Math.floor(x),cy=Math.floor(y);if(cx<0||cy<0||cx>=W||cy>=H)return false;return !colliders().has(k(cx,cy));}

function drawCompanion(t){if(state.mode==='battle')return;const p=state.player,off=p.dir==='left'?[.72,0]:p.dir==='right'?[-.72,0]:p.dir==='up'?[0,.72]:[0,-.72];drawHuman((p.rx||p.x)+off[0],(p.ry||p.y)+off[1],{name:'초랑',color:'#6d4a58',hair:'#2c1e1d',child:true,moving:p.moving},t);}
function drawPlayer(t){
  if(state.mode==='battle')return;
  const p=state.player;
  if(p.dashTrail&&p.dashTrail.length){
    ctx.save();
    for(const tr of p.dashTrail){
      const a=clamp(tr.life/(tr.max||230),0,1), x=Math.round(tr.x*TILE+8), y=Math.round(tr.y*TILE+15);
      ctx.globalAlpha=.18*a;ctx.fillStyle='#d7b66e';ctx.shadowColor='rgba(199,156,89,.75)';ctx.shadowBlur=8;ctx.fillRect(x-9,y-24,18,24);
      ctx.globalAlpha=.12*a;ctx.fillStyle='#9a4034';ctx.fillRect(x-13,y-16,26,5);
    }
    ctx.restore();
  }
  drawHuman(p.rx||p.x,p.ry||p.y,{name:'김삿갓',color:'#26374b',hair:'#332219',player:true,moving:p.moving},t);
}

function paperMiniSprite(opt,t){
  const skin=opt.child?'#d9b07a':'#c99469',hair=opt.hair||'#111820',cloth=opt.color||'#16283d';
  const dark=shade(cloth,-45), mid=shade(cloth,-14), light=opt.player?'#d7b66e':shade(cloth,28);

  cutPoly([[5,22],[19,22],[22,25],[2,25]],'rgba(0,0,0,.38)','rgba(0,0,0,0)',0);
  // legs and boots
  cutPoly([[7-leg,16],[11-leg,16],[11,22],[6,22]],dark,paperPal.ink,1.05);
  cutPoly([[13+leg,16],[17+leg,16],[18,22],[12,22]],dark,paperPal.ink,1.05);
  pxo(6,21,6,3,'#080b0e');pxo(13,21,7,3,'#080b0e');

  cutPoly([[5,9],[19,9],[18,18],[12,21],[6,18]],cloth,paperPal.ink,1.55);
  cutPoly([[7,10],[12,10],[10,19],[5,18]],rgba(light,.86),paperPal.ink,.55);

  // arms and hands
  cutPoly([[5,11],[2,14],[4,18],[8,15]],skin,paperPal.ink,.95);cutPoly([[19,11],[22,14],[21,18],[16,15]],skin,paperPal.ink,.95);
  if(opt.player){cutRect(20,10,3,15,'#172535',paperPal.ink,.65,.35);ctx.fillStyle=rgba('#d7b66e',.65);ctx.fillRect(21,12,1,10);} 
  // head and hair
  cutPoly([[7,3],[17,3],[18,11],[6,11]],skin,paperPal.ink,1.25);
  cutPoly([[6,2],[18,2],[17,7],[7,7]],hair,paperPal.ink,1.0);
  px(9,7,2,2,'#071019');px(14,7,2,2,'#071019');px(10,7,5,1,'#fff3cf');
  if(opt.child){px(8,10,2,1,'#d2806e');px(15,10,2,1,'#d2806e');}
  if(opt.player){
    cutPoly([[1,5],[12,-3],[23,5],[19,9],[5,9]],'#09131f',paperPal.ink,1.55);

  }

  ctx.restore();
}

}

  for(let i=0;i<64;i++){

    ctx.fillStyle=i%9===0?rgba('#9a4034',.070):rgba('#d7b66e',.052);
    ctx.fillRect(Math.round(x),Math.round(y),i%9===0?2:1,i%4===0?6:3);
  }
  ctx.fillStyle=rgba('#f0d7a3',.032);for(let x=0;x<VIEW_W;x+=31)ctx.fillRect(x,0,1,VIEW_H);
  ctx.fillStyle=rgba('#201308',.145);for(let x=13;x<VIEW_W;x+=57)ctx.fillRect(x,0,1,VIEW_H);
  ctx.strokeStyle=rgba('#d7b66e',.055);ctx.lineWidth=1;for(let y=18;y<VIEW_H;y+=40){ctx.beginPath();ctx.moveTo(0,y+Math.sin(t/900+y)*2);ctx.lineTo(VIEW_W,y+Math.cos(t/860+y)*2);ctx.stroke();}
  const g=ctx.createRadialGradient(VIEW_W*.5,VIEW_H*.30,84,VIEW_W*.5,VIEW_H*.50,520);

}


function drawBattle(t){
  const b=state.battle,p=state.player;if(!b)return;
  const view=b.view||{x:28,y:66,w:664,h:350};
  const arena=b.arena;
  const camX=clamp(b.px-view.w/2,arena.x,arena.x+arena.w-view.w);
  const camY=clamp(b.py-view.h/2,arena.y,arena.y+arena.h-view.h);
  b.camX=camX;b.camY=camY;

  ctx.fillStyle='rgba(38,24,13,.88)';ctx.fillRect(0,0,VIEW_W,VIEW_H);
  const back=ctx.createLinearGradient(0,62,0,VIEW_H);
  back.addColorStop(0,'rgba(229,194,132,.10)');
  back.addColorStop(.45,'rgba(199,156,89,.040)');
  back.addColorStop(1,'rgba(13,8,5,.38)');
  ctx.fillStyle=back;ctx.fillRect(0,0,VIEW_W,VIEW_H);

  // Fixed viewport frame; the world inside is larger than the visible combat window.
  cutRect(view.x-10,view.y-12,view.w+20,view.h+24,'rgba(69,45,24,.94)',paperPal.ink,2.2,1.6);
  ctx.save();
  ctx.beginPath();ctx.rect(view.x,view.y,view.w,view.h);ctx.clip();
  ctx.translate(view.x-camX,view.y-camY);

  const floorGrad=ctx.createLinearGradient(0,0,arena.w,arena.h);
  floorGrad.addColorStop(0,'#6c4a2c');floorGrad.addColorStop(.52,'#8b633b');floorGrad.addColorStop(1,'#3a2619');
  ctx.fillStyle=floorGrad;ctx.fillRect(arena.x,arena.y,arena.w,arena.h);
  paperSpeckle(arena.x,arena.y,arena.w,arena.h,.018,150);
  drawBattleArenaDetails(t,b);

  ctx.fillStyle=rgba('#f0d29a',.080);for(let y=arena.y;y<arena.y+arena.h;y+=24)ctx.fillRect(arena.x,y,arena.w,1);
  ctx.fillStyle=rgba('#d7b66e',.050);for(let x=arena.x;x<arena.x+arena.w;x+=31)ctx.fillRect(x,arena.y,1,arena.h);
  ctx.strokeStyle=rgba('#d7b66e',.48);ctx.lineWidth=2;ctx.strokeRect(arena.x,arena.y,arena.w,arena.h);
  ctx.strokeStyle=rgba('#9a4034',.22);ctx.lineWidth=1;ctx.strokeRect(arena.x+12,arena.y+12,arena.w-24,arena.h-24);

  for(const pd of b.puddles){ctx.fillStyle=rgba(pd.kind==='poison'?'#2ee4a8':'#d7b66e',.18);ctx.beginPath();ctx.ellipse(pd.x,pd.y,pd.r,pd.r*.50,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle=rgba('#fff3cf',.20);ctx.stroke();}
  for(const d of b.dangers)drawDanger(d);
  for(const pr of b.projectiles)drawProjectile(pr,t);

  ctx.save();ctx.translate(b.enemy.x,b.enemy.y);const escale=b.enemy.boss?1.82:1.46;ctx.scale(escale,escale);drawMonsterSprite(b.enemy.sprite,t,true);ctx.restore();
  if(b.enemy.hitFlash>0){ctx.save();ctx.globalAlpha=.24*(b.enemy.hitFlash/150);ctx.fillStyle='#fff3cf';ctx.shadowColor='rgba(199,156,89,.9)';ctx.shadowBlur=16;ctx.beginPath();ctx.ellipse(b.enemy.x,b.enemy.y,b.enemy.boss?78:48,b.enemy.boss?48:30,0,0,Math.PI*2);ctx.fill();ctx.restore();}

  ctx.save();ctx.globalAlpha=p.invuln>0?(Math.floor(t/80)%2?.45:1):1;ctx.translate(b.px,b.py);ctx.scale(1.35,1.35);paperMiniSprite({player:true,color:'#352416',hair:'#1d140e'},t);ctx.restore();
  drawEquippedWeapon(t);
  drawCooldownTimer(t);

  for(const s of b.slashes)drawSlash(s);

  ctx.font='bold 12px monospace';ctx.textAlign='center';
  for(const tx of b.texts){ctx.globalAlpha=clamp(tx.life/tx.max,0,1);ctx.fillStyle=tx.color;ctx.shadowColor=tx.color;ctx.shadowBlur=6;ctx.fillText(tx.text,tx.x,tx.y);ctx.shadowBlur=0;}
  ctx.globalAlpha=1;ctx.textAlign='left';
  ctx.restore();

  // Screen-space frame and map size guide.
  ctx.save();
  ctx.strokeStyle=rgba('#d7b66e',.72);ctx.lineWidth=2;ctx.strokeRect(view.x,view.y,view.w,view.h);
  ctx.strokeStyle=rgba('#9a4034',.26);ctx.lineWidth=1;ctx.strokeRect(view.x+6,view.y+6,view.w-12,view.h-12);
  ctx.fillStyle=rgba('#0a1119',.72);ctx.fillRect(view.x+8,view.y+8,142,16);
  ctx.fillStyle='#f2ddb0';ctx.font='bold 9px monospace';ctx.fillText('확장 전투장 '+arena.w+'×'+arena.h,view.x+14,view.y+19);
  ctx.restore();

  drawBattleHud(t);
}

function drawBattleArenaDetails(t,b){
  const arena=b.arena;
  ctx.save();
  // Distant hanji patches and neon code knots that make the larger arena readable while moving.
  for(let i=0;i<16;i++){
    const x=70+(i*137)%Math.max(120,arena.w-120), y=66+(i*89)%Math.max(120,arena.h-120);
    const w=44+(i%4)*18, h=18+(i%3)*10;
    ctx.fillStyle=rgba(i%2?'#f0d2a1':'#382312',.055);ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=rgba(i%3?'#d7b66e':'#9a4034',.10);ctx.lineWidth=1;ctx.strokeRect(x+2,y+2,w-4,h-4);
  }
  ctx.lineCap='round';
  for(let i=0;i<11;i++){
    const y=60+i*54+Math.sin(t/900+i)*2;
    ctx.strokeStyle=rgba(i%2?'#9a4034':'#d7b66e',.075);ctx.lineWidth=i%3===0?2:1;
    ctx.beginPath();ctx.moveTo(arena.x+40,y);ctx.bezierCurveTo(arena.w*.25,y-18,arena.w*.62,y+18,arena.w-46,y-3);ctx.stroke();
  }
  for(let i=0;i<18;i++){
    const x=40+(i*73)%Math.max(80,arena.w-80), y=50+(i*61)%Math.max(80,arena.h-80);
    ctx.fillStyle=rgba(i%2?'#d7b66e':'#9a4034',.16+.04*Math.sin(t/300+i));ctx.shadowColor=rgba(i%2?'#d7b66e':'#9a4034',.35);ctx.shadowBlur=5;
    ctx.fillRect(Math.round(x)-1,Math.round(y)-1,3,3);ctx.shadowBlur=0;
  }
  // Four paper shrine posts that act as visual landmarks without blocking movement.
  [[94,92],[arena.w-120,98],[114,arena.h-100],[arena.w-132,arena.h-92]].forEach(([x,y],i)=>{
    cutRect(x,y,12,50,i%2?'#3d2a1d':'#33251b',paperPal.ink,1,.8);
    ctx.fillStyle=rgba(i%2?'#9a4034':'#d7b66e',.50);ctx.fillRect(x+5,y+4,2,42);
    ctx.fillRect(x-8,y+18,28,2);
  });
  ctx.restore();
}

function drawDanger(d){
  const ratio=clamp(d.ttl/d.max,0,1), alpha=.12+.26*(1-ratio);
  ctx.save();ctx.fillStyle=rgba('#8e3228',alpha);ctx.strokeStyle=rgba('#d49b82',.62);ctx.lineWidth=2;
  ctx.shadowColor='rgba(142,50,40,.50)';ctx.shadowBlur=8;
  if(d.kind==='circle'){ctx.beginPath();ctx.ellipse(d.x,d.y,d.r,d.r*.54,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=rgba('#ffffff',.18);ctx.fillRect(d.x-2,d.y-2,4,4);}
  else{ctx.translate(d.x,d.y);ctx.rotate(d.ang);ctx.fillRect(0,-d.w/2,d.len,d.w);ctx.strokeRect(0,-d.w/2,d.len,d.w);ctx.fillStyle=rgba('#ffffff',.22);ctx.fillRect(0,-1,d.len,2);}
  ctx.restore();
}

function norm(k){
  if(k==='ArrowUp'||k==='w'||k==='W')return'up';
  if(k==='ArrowDown'||k==='s'||k==='S')return'down';
  if(k==='ArrowLeft'||k==='a'||k==='A')return'left';
  if(k==='ArrowRight'||k==='d'||k==='D')return'right';
  return null;
}
window.addEventListener('keydown',e=>{
  if(dom.cutscene.style.display==='block'){
    if(['Enter',' ','z','Z'].includes(e.key)){dom.cutNext.click();e.preventDefault();}
    return;
  }
  if(state.mode==='dialog'||state.dialogOpen){
    const n=parseInt(e.key,10); if(n>=1&&n<=dom.options.children.length){dom.options.children[n-1].click();e.preventDefault();}
    return;
  }
  const m=norm(e.key); if(m){keysDown.add(m);e.preventDefault();return;}
  if(state.mode==='battle'){
    if(e.code==='Space'||e.key===' '){battlePlayerAction('dash');e.preventDefault();return;}
    const key=e.key.toLowerCase();
    if(key==='q'){battlePlayerAction('attack');e.preventDefault();return;}
    if(key==='e'){battlePlayerAction('poem');e.preventDefault();return;}
    if(key==='r'){battlePlayerAction('net');e.preventDefault();return;}
    if(key==='f'){battlePlayerAction('talisman');e.preventDefault();return;}
    if(key==='c'){battlePlayerAction('drink');e.preventDefault();return;}
    if(e.key==='Escape'){battlePlayerAction('run');e.preventDefault();return;}
    return;
  }
  if(e.code==='Space'||e.key===' '){if(!e.repeat){fieldDash();if(nearbyLocation())interact();}e.preventDefault();return;}
  if(['Enter','z','Z'].includes(e.key)){if(!e.repeat)interact();e.preventDefault();}
});

drawProjectile=function drawPaperProjectile(p,t){ctx.save();ctx.translate(p.x,p.y);if(p.kind==='ember'){cutPoly([[-5,2],[0,-8],[6,2],[1,7]],'#b85d36',paperPal.ink,.9);ctx.fillStyle=rgba('#ffe3a0',.55);ctx.fillRect(-1,-3,3,4);}else if(p.kind==='water'){ctx.fillStyle=rgba('#d0c49c',.36);ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*.62,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle=paperPal.ink;ctx.stroke();}else if(p.kind==='mist'){ctx.fillStyle=rgba('#e0d3ae',.30);ctx.beginPath();ctx.ellipse(0,0,p.r*1.35,p.r*.48,Math.sin(t/200),0,Math.PI*2);ctx.fill();ctx.strokeStyle=rgba('#fff0c4',.26);ctx.stroke();}else if(p.kind==='spark'){ctx.strokeStyle=rgba('#d7b66e',.88);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-2,-5);ctx.lineTo(3,4);ctx.lineTo(9,-1);ctx.stroke();}else{cutRect(-6,-9,12,18,'#fff0c4',paperPal.ink,1,.5);ctx.fillStyle='#8f352b';ctx.fillRect(-1,-6,2,12);}ctx.restore();};

drawSlash=function drawPaperSlash(s){const a=clamp(s.life/s.max,0,1),grow=1-a;ctx.save();if(s.kind==='death'){ctx.translate(s.x,s.y);ctx.globalAlpha=.20+.80*a;ctx.strokeStyle=rgba(s.color||'#fff0b8',.95);ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(0,0,s.r*(.30+grow*.88),s.r*(.18+grow*.46),0,0,Math.PI*2);ctx.stroke();ctx.strokeStyle=rgba(s.sub||'#9a4034',.62);ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,s.r*(.18+grow*.58),s.r*(.10+grow*.32),0,0,Math.PI*2);ctx.stroke();ctx.fillStyle=rgba('#fff8df',.82);for(let i=0;i<10;i++){const th=i*Math.PI*2/10+grow*.8;ctx.fillRect(Math.cos(th)*s.r*grow-2,Math.sin(th)*s.r*.52*grow-2,4,4);}ctx.restore();return;}if(s.kind==='shard'){const d=(1-a)*(s.spd||70);ctx.translate(s.x+Math.cos(s.ang)*d,s.y+Math.sin(s.ang)*d*.70);ctx.rotate(s.ang);ctx.globalAlpha=a;cutRect(-s.size,-s.size,s.size*3,s.size*2,s.color||'#d7b66e',paperPal.ink,.5,.25);ctx.restore();return;}if(s.kind==='impact'){ctx.translate(s.x,s.y);ctx.rotate(s.ang||0);ctx.globalAlpha=.25+.75*a;ctx.strokeStyle=rgba('#fff3cf',.90);ctx.lineWidth=3;for(let i=0;i<12;i++){const ang=i*Math.PI*2/12;ctx.beginPath();ctx.moveTo(Math.cos(ang)*8,Math.sin(ang)*8);ctx.lineTo(Math.cos(ang)*(s.r+15*grow),Math.sin(ang)*(s.r+15*grow));ctx.stroke();}ctx.fillStyle=rgba('#d7b66e',.80);ctx.fillRect(-5,-5,10,10);ctx.fillStyle=rgba('#9a4034',.75);ctx.fillRect(-2,-2,4,4);}else if(s.pulse){ctx.globalAlpha=.18+.62*a;ctx.strokeStyle=rgba('#d7b66e',.84);ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(s.x,s.y,s.r*(1+grow*.32),s.r*(.62+grow*.14),0,0,Math.PI*2);ctx.stroke();ctx.strokeStyle=rgba('#9a4034',.42);ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(s.x,s.y,s.r*(.66+grow*.22),s.r*(.40+grow*.10),0,0,Math.PI*2);ctx.stroke();}else{ctx.translate(s.x,s.y);ctx.rotate(s.ang);ctx.globalAlpha=.22+.78*a;const c1=s.color1||'#fff3cf',c2=s.color2||'#d7b66e',c3=s.style==='moon'?'#9a4034':s.style==='chain'?'#8f6c43':'#d7b66e';if(s.style==='chain'){ctx.strokeStyle=rgba(c2,.92);ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-s.r*.25,0);ctx.bezierCurveTo(s.r*.15,-s.r*.22,s.r*.58,s.r*.20,s.r*.92,0);ctx.stroke();for(let i=0;i<8;i++){const xx=-s.r*.18+i*s.r*.14,yy=Math.sin(i*.9+grow*4)*10;cutRect(xx-3,yy-3,7,6,i%2?c1:c2,paperPal.ink,.45,.2);}}else if(s.style==='lightning'){ctx.strokeStyle=rgba(c1,.95);ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-s.r*.55,0);ctx.lineTo(-s.r*.12,-s.r*.20);ctx.lineTo(s.r*.18,s.r*.12);ctx.lineTo(s.r*.55,-s.r*.08);ctx.stroke();}else{const wide=s.style==='moon'?1.08:1;ctx.strokeStyle=rgba(c1,.96);ctx.lineWidth=s.style==='moon'?14:12;ctx.beginPath();ctx.arc(0,0,s.r*(.84+grow*.22)*wide,-1.10,1.10);ctx.stroke();ctx.strokeStyle=rgba(c2,.82);ctx.lineWidth=s.style==='moon'?8:7;ctx.beginPath();ctx.arc(0,0,s.r*(.76+grow*.18)*wide,-.98,.98);ctx.stroke();ctx.strokeStyle=rgba(c3,.72);ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,s.r*(.66+grow*.16)*wide,-.86,.86);ctx.stroke();}ctx.strokeStyle=rgba('#1d120a',.78);ctx.lineWidth=1.3;ctx.beginPath();ctx.arc(0,0,s.r*(.93+grow*.20),-1.18,1.18);ctx.stroke();}ctx.restore();};

drawEquippedWeapon=function drawPaperWeapon(t){const b=state.battle;if(!b)return;const w=currentWeapon();ctx.save();ctx.translate(b.px,b.py);ctx.rotate(b.pdir);if(w.style==='moon'){cutRect(8,-3,31,5,'#e4d5b4',paperPal.ink,.8,.4);cutPoly([[35,-9],[52,-3],[35,8]],'#9d4734',paperPal.ink,.8);}else if(w.style==='chain'){ctx.strokeStyle=rgba('#8f6c43',.88);ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(6,0);ctx.lineTo(42+Math.sin(t/90)*4,0);ctx.stroke();for(let i=12;i<46;i+=8)cutRect(i,-3,5,6,'#e4d5b4',paperPal.ink,.5,.2);}else if(w.style==='lightning'){cutRect(8,-3,42,6,'#604226',paperPal.ink,.8,.4);ctx.strokeStyle=rgba('#d7b66e',.86);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(18,-5);ctx.lineTo(28,3);ctx.lineTo(37,-4);ctx.lineTo(48,2);ctx.stroke();}else{cutRect(8,-2,34,4,'#5b3a20',paperPal.ink,.7,.4);ctx.fillStyle=rgba('#ead29d',.65);ctx.fillRect(16,-1,18,1);}ctx.restore();};

drawCooldownTimer=function drawPaperCooldown(t){const b=state.battle;if(!b)return;const w=currentWeapon();const cd=b.actionCD.attack||0,max=b.attackMax||w.cooldown;const x=b.px,y=b.py-47;ctx.save();ctx.textAlign='center';ctx.font='bold 10px serif';fiberRect(x-22,y-9,44,15,cd>0?'rgba(56,37,22,.92)':'rgba(70,46,25,.92)',paperPal.ink,1,.7);if(cd>0){const ratio=clamp(1-cd/max,0,1);ctx.fillStyle=rgba('#d7b66e',.55);ctx.fillRect(x-19,y+3,Math.floor(38*ratio),3);ctx.fillStyle='#fff2cf';ctx.fillText((cd/1000).toFixed(1),x,y+1);}else{ctx.fillStyle='#edd59a';ctx.fillText('Q 준비',x,y+2);}ctx.textAlign='left';ctx.restore();};

drawBattleHud=function drawPureBattleHud(t){const b=state.battle,p=state.player,e=b.enemy;drawBattleBar(58,28,210,14,p.hp/p.maxHp,'김삿갓 HP '+p.hp+'/'+p.maxHp,'#8e5d42');drawBattleBar(58,48,210,10,p.sp/p.maxSp,'기력 '+p.sp+'/'+p.maxSp,'#596f7a');drawBattleBar(434,28,228,14,e.hp/e.maxHp,e.name+' HP '+e.hp+'/'+e.maxHp,'#8e5d42');drawBattleBar(434,48,228,10,b.calm/e.calmGoal,'진정 '+Math.round(b.calm)+'/'+e.calmGoal,'#596f7a');fiberRect(58,430,604,34,'rgba(48,34,22,.90)',paperPal.ink,1.5,1);ctx.fillStyle='#ead9bd';ctx.font='bold 11px serif';ctx.fillText('Q 기본공격('+currentWeapon().name+')  E 스킬  R 포획그물  Space 회피  F 부적  C 막걸리  Esc 도망',70,450);ctx.fillStyle='#c6b99d';ctx.font='10px serif';const cd=Object.entries(b.actionCD).filter(([k,v])=>v>0).map(([k,v])=>`${k}:${(v/1000).toFixed(1)}`).join('  ');ctx.fillText(cd||'실시간 입력 가능',70,464);ctx.textAlign='right';ctx.fillStyle='#d0b277';ctx.fillText(e.pattern,650,450);ctx.textAlign='left';};

drawBattleBar=function drawPaperBattleBar(x,y,w,h,ratio,label,color){fiberRect(x,y,w,h,'#2b1c10',paperPal.ink,1,.5);const grad=ctx.createLinearGradient(x+2,y,x+w-2,y);if(color==='#596f7a'){grad.addColorStop(0,'#9f8955');grad.addColorStop(1,'#d5bc78');}else{grad.addColorStop(0,'#8e4b35');grad.addColorStop(1,'#c8915a');}ctx.fillStyle=grad;ctx.fillRect(x+2,y+2,Math.max(0,Math.floor((w-4)*clamp(ratio,0,1))),h-4);ctx.fillStyle='#f2ddb0';ctx.font='bold 10px serif';ctx.fillText(label,x+4,y-4);};

drawMinimap=function drawPaperMinimap(t){if(state.mode==='battle'&&state.battle){drawBattleMinimap(t);return;}if(state.mode!=='walk')return;const mw=134,mh=94,x=VIEW_W-mw-18,y=VIEW_H-mh-18;ctx.save();fiberRect(x-7,y-18,mw+14,mh+24,'rgba(48,34,22,.90)',paperPal.ink,1.2,.8);ctx.fillStyle='#ead9bd';ctx.font='bold 9px serif';ctx.fillText('지도 · '+mapName(),x,y-7);const sx=mw/W,sy=mh/H,m=maps[state.map];for(let yy=0;yy<H;yy++)for(let xx=0;xx<W;xx++){const tile=m[yy][xx];ctx.fillStyle=tile==='p'?'#b59662':tile==='w'?'#77745c':tile==='h'?'#403723':tile==='r'?'#746955':'#62653f';ctx.fillRect(x+xx*sx,y+yy*sy,Math.ceil(sx),Math.ceil(sy));}const locs=(locations[state.map]||[]).filter(l=>!l.phases||l.phases.includes(state.phase));ctx.fillStyle='#d0ad68';for(const l of locs){ctx.fillRect(x+l.x*sx-1,y+l.y*sy-1,3,3);}ctx.fillStyle='#9a4034';for(const e of activeEnemies()){if(e.alive!==false)ctx.fillRect(x+e.x*sx-1.5,y+e.y*sy-1.5,3,3);}ctx.fillStyle='#fff3cf';ctx.beginPath();ctx.arc(x+state.player.x*sx,y+state.player.y*sy,3.2,0,Math.PI*2);ctx.fill();ctx.restore();};

drawBattleMinimap=function drawPaperBattleMinimap(t){const b=state.battle;if(!b)return;const mw=126,mh=78,x=VIEW_W-mw-22,y=74,ar=b.arena;const sx=mw/ar.w,sy=mh/ar.h;ctx.save();fiberRect(x-7,y-18,mw+14,mh+24,'rgba(48,34,22,.90)',paperPal.ink,1.2,.8);ctx.fillStyle='#ead9bd';ctx.font='bold 9px serif';ctx.fillText('전투 지도',x,y-7);ctx.fillStyle=rgba('#5c412a',.88);ctx.fillRect(x,y,mw,mh);ctx.fillStyle=rgba('#d7b66e',.08);for(let gx=0;gx<mw;gx+=16)ctx.fillRect(x+gx,y,1,mh);ctx.fillStyle=rgba('#3a2415',.07);for(let gy=0;gy<mh;gy+=14)ctx.fillRect(x,y+gy,mw,1);ctx.strokeStyle=rgba('#2b1a0e',.70);ctx.strokeRect(x,y,mw,mh);ctx.strokeStyle=rgba('#fff8df',.45);ctx.strokeRect(x+b.camX*sx,y+b.camY*sy,b.view.w*sx,b.view.h*sy);for(const d of b.dangers){ctx.fillStyle=rgba('#8e3228',.66);const dx=x+(d.x-ar.x)*sx,dy=y+(d.y-ar.y)*sy;if(d.kind==='circle'){ctx.beginPath();ctx.arc(dx,dy,Math.max(2,d.r*sx),0,Math.PI*2);ctx.fill();}else{ctx.save();ctx.translate(dx,dy);ctx.rotate(d.ang);ctx.fillRect(0,-1,Math.max(4,d.len*sx),2);ctx.restore();}}ctx.fillStyle=rgba('#9a4034',.95);ctx.beginPath();ctx.arc(x+(b.enemy.x-ar.x)*sx,y+(b.enemy.y-ar.y)*sy,b.enemy.boss?4:3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff8df';ctx.beginPath();ctx.arc(x+(b.px-ar.x)*sx,y+(b.py-ar.y)*sy,3.2,0,Math.PI*2);ctx.fill();ctx.restore();};

const oldUpdateHudPure=updateHud;
updateHud=function updatePureHanjiHud(){const loc=nearbyLocation();if(state.mode==='battle'&&state.battle){dom.hud.innerHTML=`<b>실시간 환수전</b> · ${esc(state.battle.enemy.name)}<br>한지 전투장을 돌며 HP 0·진정·포획 중 하나를 노린다`;dom.hint.innerHTML='WASD/방향키: 이동<br>Q: 기본 공격 · E: 스킬<br>R: 포획그물 · Space: 회피<br>F: 부적 · C: 막걸리';}else{dom.hud.innerHTML=`<b>${mapName()}</b> · ${chapterName()}<br>${questText()}${loc?'<br>상호작용: '+esc(loc.name):''}`;dom.hint.innerHTML='WASD/방향키: 이동<br>Space: 대쉬+상호작용 · Enter/Z: 상호작용<br>우측 하단: 미니맵<br>전투 중: Q 공격·E 스킬·R 포획·Space 회피';}};

// Make Space in walk mode visibly both dash and interact. The keydown handler above already calls both;
// this toast makes the combined affordance clear when near a target.
const oldFieldDashPure=fieldDash;
fieldDash=function fieldDashPure(){oldFieldDashPure();if(nearbyLocation())toast('Space: 대쉬와 상호작용을 함께 실행');};


/* === Pure Hanji Detail Refinement =========================================
   Repaints buildings, human sprites, labels and field interaction marker so
   the visible map no longer carries neon/cyber object accents.
============================================================================ */
function drawHatch(x,y,w,h,color='rgba(59,35,17,.13)',step=5){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=.75;for(let i=-h;i<w;i+=step){ctx.beginPath();ctx.moveTo(x+i,y+h);ctx.lineTo(x+i+h,y);ctx.stroke();}ctx.restore();}
function drawPaperLabel(cx,y,label){ctx.save();ctx.font='bold 8px serif';ctx.textAlign='center';ctx.fillStyle='rgba(31,18,9,.72)';ctx.fillText(label,cx,y+1);ctx.fillStyle='#e6c98e';ctx.fillText(label,cx,y);ctx.textAlign='left';ctx.restore();}

drawPaperBuilding=function drawPureHanjiBuilding(x,y,w,h,opt={}){
  const ox=x*TILE,oy=y*TILE,width=w*TILE,height=h*TILE,type=opt.type||'chief';
  const ink=paperPal.ink;
  const bodyTop=oy+30, bodyBottom=oy+height-13;
  const roof= type==='shaman'?'#5c3327':type==='office'?'#684028':'#573523';
  const wall= type==='shaman'?'#9a7a58':type==='office'?'#b39563':'#a98255';
  ctx.save();
  ctx.fillStyle=paperPal.shadow;ctx.beginPath();ctx.ellipse(ox+width/2,oy+height+1,width*.50,7,0,0,Math.PI*2);ctx.fill();
  // Back paper patch, body, and woven shadow.
  cutPoly([[ox+8,bodyTop-2],[ox+width-8,bodyTop-1],[ox+width-6,bodyBottom+8],[ox+6,bodyBottom+10]],wall,ink,1.7);
  paperSpeckle(ox+10,bodyTop,width-20,bodyBottom-bodyTop+8,.040,Math.max(18,Math.floor(width*h/14)));
  drawHatch(ox+11,bodyTop+3,width-22,bodyBottom-bodyTop+4,'rgba(57,33,16,.105)',7);
  ctx.fillStyle='rgba(255,241,190,.12)';ctx.fillRect(ox+14,bodyTop+4,width-28,2);
  // Roof is layered torn paper, not neon.
  if(type==='shaman'){
    cutPoly([[ox+10,oy+7],[ox+width-13,oy+8],[ox+width-4,oy+22],[ox+width+1,oy+30],[ox-2,oy+30],[ox+4,oy+20]],roof,ink,2.2);
    cutPoly([[ox+13,oy+12],[ox+width-17,oy+12],[ox+width-8,oy+23],[ox+4,oy+24]],'#744536',ink,.9);
    for(let xx=ox+11;xx<ox+width-10;xx+=7){ctx.fillStyle=rgba('#ead7a1',.14);ctx.fillRect(xx,oy+13+phash(xx,oy)*4,1,13);}
  }else if(type==='office'){
    cutPoly([[ox+13,oy+5],[ox+width-13,oy+5],[ox+width-4,oy+14],[ox+width+2,oy+24],[ox+width-3,oy+31],[ox+2,oy+31],[ox-3,oy+24],[ox+5,oy+14]],roof,ink,2.3);
    cutPoly([[ox+20,oy+7],[ox+width-20,oy+7],[ox+width-9,oy+16],[ox+width-17,oy+21],[ox+17,oy+21],[ox+9,oy+16]],'#835237',ink,.9);
    cutRect(ox+width/2-18,oy+1,36,5,'#7a4d31',ink,1.1,.8);
  }else{
    cutPoly([[ox+9,oy+7],[ox+width-10,oy+8],[ox+width+1,oy+22],[ox+width-2,oy+31],[ox+1,oy+31],[ox+4,oy+20]],roof,ink,2.2);
    cutPoly([[ox+14,oy+13],[ox+width-15,oy+13],[ox+width-7,oy+23],[ox+6,oy+24]],'#70462d',ink,.85);
  }
  ctx.fillStyle=rgba('#1b1008',.20);ctx.fillRect(ox+5,oy+29,width-10,3);
  // Beams and pillars.
  const beam=type==='shaman'?'#8e4635':'#6b4528';
  cutRect(ox+9,bodyTop-4,width-18,5,beam,ink,1.1,1.0);
  cutRect(ox+11,bodyBottom-5,width-22,5,shade(beam,-10),ink,1.0,1.0);
  [14,width/2-2,width-18].forEach(pxv=>{cutRect(ox+pxv,bodyTop-1,5,bodyBottom-bodyTop+10,'#4d2f1a',ink,1.0,1.0);ctx.fillStyle=rgba('#fff0bc',.18);ctx.fillRect(ox+pxv+2,bodyTop,1,bodyBottom-bodyTop+7);});
  // Doors and windows.
  const doorW=Math.min(26,width*.28),doorX=ox+width/2-doorW/2;
  cutRect(doorX,bodyTop+8,doorW,bodyBottom-bodyTop-5,'#3e2816',ink,1.2,.9);
  drawHatch(doorX+2,bodyTop+10,doorW-4,bodyBottom-bodyTop-10,'rgba(225,196,128,.14)',4);
  for(let wx=ox+18;wx<ox+width-20;wx+=34){if(Math.abs(wx-(doorX+doorW/2))<18)continue;drawPaperWindow(wx,bodyTop+8);}
  if(type==='mill')drawPaperMillWheel(ox+width-4,oy+height-21);
  if(opt.label)drawPaperLabel(ox+width/2,bodyBottom+10,opt.label);
  ctx.restore();
};

paperMiniSprite=function paperMiniSpritePure(opt,t){
  const walk=Math.sin(t/120)*(opt.moving?1:0), skin=opt.skin||'#d2a674', cloth=opt.color||'#6b4b31', hair=opt.hair||'#22150d';
  const dark=shade(cloth,-38), mid=shade(cloth,-12), light=opt.player?'#d8b775':shade(cloth,24);
  ctx.save();
  // Soft cut-paper shadow.
  ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(12,24,10,3,0,0,Math.PI*2);ctx.fill();
  // Legs.
  cutPoly([[7-walk,16],[11-walk,16],[11,22],[6,22]],dark,paperPal.ink,1.05);
  cutPoly([[13+walk,16],[17+walk,16],[18,22],[12,22]],dark,paperPal.ink,1.05);
  // Coat/body in 3 paper layers.
  cutPoly([[5,9],[19,9],[18,18],[12,21],[6,18]],cloth,paperPal.ink,1.55);
  cutPoly([[7,10],[12,10],[10,19],[5,18]],rgba(light,.86),paperPal.ink,.55);
  cutPoly([[13,10],[19,10],[18,18],[13,20]],mid,paperPal.ink,.55);
  ctx.fillStyle=rgba('#fff0bc',.16);ctx.fillRect(8,11,7,1);
  // Arms.
  cutPoly([[5,11],[2,14],[4,18],[8,15]],skin,paperPal.ink,.95);cutPoly([[19,11],[22,14],[21,18],[16,15]],skin,paperPal.ink,.95);
  if(opt.player){cutRect(20,10,3,15,'#5a371f',paperPal.ink,.65,.35);ctx.fillStyle=rgba('#ead29d',.65);ctx.fillRect(21,12,1,10);} 
  // Head and hair.
  cutPoly([[7,3],[17,3],[18,11],[6,11]],skin,paperPal.ink,1.25);
  cutPoly([[6,2],[18,2],[17,7],[7,7]],hair,paperPal.ink,1.0);
  ctx.fillStyle='#17100a';ctx.fillRect(9,7,2,2);ctx.fillRect(14,7,2,2);ctx.fillStyle=rgba('#fff2cf',.42);ctx.fillRect(10,6,5,1);
  if(opt.player){
    // Broad paper gat with torn brim and woven highlight.
    cutPoly([[1,5],[12,-3],[23,5],[19,9],[5,9]],'#3d2818',paperPal.ink,1.55);
    cutPoly([[8,-1],[16,-1],[18,4],[6,4]],'#6a462a',paperPal.ink,.9);
    ctx.strokeStyle=rgba('#ead29d',.36);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(5,7);ctx.lineTo(19,7);ctx.stroke();
    cutRect(2,12,2,12,'#4c2e18',paperPal.ink,.6,.25);
  }
  ctx.restore();
};

drawInteraction=function drawPureInteraction(){const near=nearbyLocation();if(!near||state.mode!=='walk')return;ctx.save();const x=Math.round(near.x*TILE),y=Math.round(near.y*TILE);ctx.strokeStyle='#d0a45f';ctx.lineWidth=2;ctx.strokeRect(x-2,y-2,TILE+4,TILE+4);fiberRect(x-7,y-19,30,14,'rgba(71,48,28,.90)',paperPal.ink,.75,.4);ctx.fillStyle='#fff0c4';ctx.font='bold 8px serif';ctx.fillText('Space',x-4,y-9);ctx.restore();};


})();
