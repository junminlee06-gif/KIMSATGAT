<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>삿갓유람: 강철이</title><style>*{box-sizing:border-box}body{margin:0;background:#120c08;color:#ead8b9;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:1040px;margin:0 auto;padding:14px;display:grid;grid-template-columns:720px 1fr;gap:14px}header{grid-column:1/-1;border-bottom:1px solid #5b4630;padding-bottom:8px}h1{margin:0;font-size:24px;color:#d3ad70}.sub{font-size:13px;color:#b79e78}.box{position:relative;border:2px solid #5c4630;background:#22170f;box-shadow:0 12px 0 #070403}canvas{display:block;width:720px;height:480px;image-rendering:pixelated;background:#25190f}.hud,.hint,.dialog{position:absolute;background:rgba(45,34,24,.92);border:2px solid #7a5b38;box-shadow:0 5px 0 rgba(0,0,0,.28)}.hud{left:10px;top:10px;padding:8px 10px;font-size:13px}.hint{right:10px;top:10px;padding:8px 10px;text-align:right;font-size:12px;color:#d1be9b}.dialog{left:16px;right:16px;bottom:16px;padding:12px;display:none}.speaker{font-weight:800;color:#e0b66d}.text{white-space:pre-wrap;margin:6px 0 10px}button{background:#4a3827;color:#f2dfc1;border:1px solid #9a7548;padding:8px 10px;cursor:pointer;font-family:inherit;text-align:left}button:hover{background:#614832}.side{display:flex;flex-direction:column;gap:10px}.card{border:1px solid #5b4630;background:#241a12;padding:10px}.card h2{font-size:15px;color:#d3ad70;margin:0 0 8px}.small{font-size:12px;color:#c4ad86;line-height:1.55}.bar{height:8px;background:#120c08;border:1px solid #5b4630;margin:3px 0 8px}.bar i{display:block;height:100%;background:#bd8050}.toast{position:absolute;left:50%;top:58px;transform:translateX(-50%);display:none;background:#3b2b1d;border:1px solid #d3ad70;padding:8px 12px;z-index:6}.mini{position:absolute;right:10px;bottom:10px;width:112px;height:76px;border:2px solid #7a5b38;background:rgba(31,24,18,.78)}@media(max-width:980px){.wrap{grid-template-columns:1fr}.box canvas{width:100%;height:auto}}</style></head><body><div class="wrap"><header><h1>삿갓유람: 한지 환수록</h1><div class="sub">WASD/방향키 이동 · Space 대쉬+상호작용 · Enter/Z 상호작용 · Q 공격 · E 시조 · R 포획</div></header><section class="box"><canvas id="game" width="1440" height="960"></canvas><div class="hud" id="hud"></div><div class="hint" id="hint"></div><div class="toast" id="toast"></div><canvas class="mini" id="mini" width="224" height="152"></canvas><div class="dialog" id="dialog"><div class="speaker" id="sp"></div><div class="text" id="tx"></div><div id="ops"></div></div></section><aside class="side"><div class="card"><h2>진행</h2><div class="small" id="quest"></div></div><div class="card"><h2>포획첩</h2><div class="small" id="book"></div></div><div class="card"><h2>조작</h2><div class="small">Space는 기본 맵에서 대쉬와 상호작용을 동시에 시도합니다. 전투 중에는 회피로 작동합니다.</div></div></aside></div><script>(()=>{const c=document.getElementById('game'),x=c.getContext('2d'),m=document.getElementById('mini'),mx=m.getContext('2d');x.setTransform(2,0,0,2,0,0);x.imageSmoothingEnabled=false;const $=id=>document.getElementById(id),hud=$('hud'),hint=$('hint'),toast=$('toast'),dia=$('dialog'),sp=$('sp'),tx=$('tx'),ops=$('ops'),quest=$('quest'),book=$('book');const keys={},W=720,H=480,T=24;let mode='field',map='village',last=0,msgT=0;const P={x:120,y:310,hp:100,max:100,ki:50,maxKi:50,lv:1,exp:0,coin:80,dash:0,atk:0,skill:0,cap:3,face:1,book:[]};const maps={village:{name:'청산고을',bg:'#bfa36f',exits:[{x:650,y:245,w:34,h:78,to:'road',px:60,py:260},{x:330,y:50,w:90,h:40,to:'market',px:360,py:390}],objs:[{x:170,y:235,n:'주막',t:'막걸리로 체력을 회복했다.',act:()=>{P.hp=P.max;P.ki=P.maxKi;say('주모','뜨끈한 국밥과 막걸리 한 사발. 체력과 기력이 회복되었다.')}},{x:400,y:220,n:'무기상',t:'무기 강화',act:()=>{if(P.coin>=40){P.coin-=40;P.lv++;P.max+=8;P.maxKi+=4;P.hp=P.max;pop('장봉을 손봤다: 레벨 상승')}else pop('엽전이 부족하다')}}],mon:[]},market:{name:'연철장터',bg:'#c9ae79',exits:[{x:338,y:410,w:92,h:45,to:'village',px:350,py:95}],objs:[{x:250,y:220,n:'보강구 장인',act:()=>{if(P.coin>=60){P.coin-=60;P.max+=15;P.maxKi+=8;P.hp=P.max;P.ki=P.maxKi;pop('한지 갑옷 보강 완료')}else pop('엽전이 부족하다')}}],mon:[]},road:{name:'북쪽 들길',bg:'#a89162',exits:[{x:20,y:245,w:34,h:78,to:'village',px:620,py:260},{x:650,y:245,w:34,h:78,to:'marsh',px:60,py:260},{x:330,y:35,w:90,h:44,to:'mine',px:360,py:390}],objs:[],mon:[['가면쥐',220,180],['흰나방',430,300],['우물갑충',540,170]]},marsh:{name:'월영나루',bg:'#b6a278',exits:[{x:20,y:245,w:34,h:78,to:'road',px:620,py:260},{x:650,y:245,w:34,h:78,to:'bamboo',px:60,py:260}],objs:[{x:330,y:220,n:'지도장인',act:()=>say('지도장인','오른쪽 아래 미니맵을 보시오. 흰 점은 삿갓, 붉은 점은 환수, 푸른 점은 길목이오.')}],mon:[['등불해파리',300,180],['백각사슴',500,300]]},bamboo:{name:'비전죽림',bg:'#9f9864',exits:[{x:20,y:245,w:34,h:78,to:'marsh',px:620,py:260},{x:650,y:245,w:34,h:78,to:'mine',px:60,py:260}],objs:[],mon:[['백침벌',250,180],['유리실거미',430,280],['금줄살무사',560,210]]},mine:{name:'적동광산',bg:'#9c7456',exits:[{x:338,y:410,w:92,h:45,to:'road',px:360,py:80},{x:650,y:245,w:34,h:78,to:'forge',px:70,py:260}],objs:[],mon:[['광맥갑충',250,250],['낫사마귀',470,200],['가면지네',560,320]]},forge:{name:'강철 폐제련소',bg:'#8f6b54',exits:[{x:20,y:245,w:34,h:78,to:'mine',px:620,py:260}],objs:[],mon:[['강철이',430,230,'boss'],['철등갑충',260,310]]}};let alive={};function spawn(k){alive[k]=(maps[k].mon||[]).map((a,i)=>({id:k+i,n:a[0],x:a[1],y:a[2],boss:a[3]=='boss',hp:a[3]=='boss'?180:60,hit:0}))}Object.keys(maps).forEach(spawn);function pop(s){toast.textContent=s;toast.style.display='block';msgT=1.5}function say(a,b,arr){mode='dialog';sp.textContent=a;tx.textContent=b;ops.innerHTML='';(arr||[['닫기',()=>{mode='field';dia.style.display='none'}]]).forEach((o,i)=>{let bt=document.createElement('button');bt.textContent=(i+1)+'. '+o[0];bt.onclick=o[1];ops.appendChild(bt)});dia.style.display='block'}function near(o){return Math.hypot(P.x-o.x,P.y-o.y)<55}function interact(){let mp=maps[map];for(const e of mp.exits)if(P.x>e.x&&P.x<e.x+e.w&&P.y>e.y&&P.y<e.y+e.h){map=e.to;P.x=e.px;P.y=e.py;spawn(map);pop(maps[map].name+' 도착');return}for(const o of mp.objs)if(near(o)){o.act();return}let mon=(alive[map]||[]).find(v=>Math.hypot(P.x-v.x,P.y-v.y)<55);if(mon)start(mon)}function start(mon){mode='battle';B={e:JSON.parse(JSON.stringify(mon)),px:360,py:320,ex:360,ey:150,hit:0,cd:0,shots:[],fx:[],boss:mon.boss};P.x=360;P.y=320;say('환수 조우',mon.n+'가 종이 바람 속에서 모습을 드러냈다.',[['싸운다',()=>{mode='battle';dia.style.display='none'}]])}let B=null;function defeat(kind){let idx=alive[map].findIndex(v=>v.id==B.e.id);if(idx>=0)alive[map].splice(idx,1);P.coin+=B.boss?120:25;P.exp+=B.boss?80:20;P.book.push(B.e.n+' - '+kind);pop(B.e.n+' '+kind);mode='field';P.x=maps[map].exits[0]?.x+60||120;P.y=260;B=null}function atk(){if(mode!='battle'||P.atk>0)return;P.atk=.62;let d=Math.hypot(P.x-B.ex,P.y-B.ey);B.fx.push({x:P.x,y:P.y,r:90,t:.18,c:'#f2d391'});if(d<118){B.e.hp-=18+P.lv*3;B.hit=.15;B.fx.push({x:B.ex,y:B.ey,r:36,t:.25,c:'#b74732'});if(B.e.hp<=0)defeat('퇴치')}}function skill(){if(mode!='battle'||P.skill>0||P.ki<12)return;P.skill=1.2;P.ki-=12;B.fx.push({x:P.x,y:P.y,r:145,t:.45,c:'#6d8766'});if(Math.hypot(P.x-B.ex,P.y-B.ey)<170){B.e.hp-=10+P.lv;B.calm=(B.calm||0)+35;if(B.calm>=100)defeat('진정')}}function cap(){if(mode!='battle'||P.cap<=0)return;P.cap--;let chance=(B.e.hp<45?0.45:0.15)+(B.calm||0)/220+(P.lv*.03);B.fx.push({x:B.ex,y:B.ey,r:80,t:.35,c:'#7f5a38'});if(Math.random()<chance)defeat('포획');else pop('포획 실패')}function dash(){if(P.dash>0)return;P.dash=.55;let dx=(keys.ArrowRight||keys.d?1:0)-(keys.ArrowLeft||keys.a?1:0),dy=(keys.ArrowDown||keys.s?1:0)-(keys.ArrowUp||keys.w?1:0);if(!dx&&!dy)dx=P.face;let l=Math.hypot(dx,dy)||1;P.x+=dx/l*62;P.y+=dy/l*62;clamp()}function clamp(){P.x=Math.max(35,Math.min(685,P.x));P.y=Math.max(55,Math.min(430,P.y))}function update(dt){if(msgT>0&&(msgT-=dt)<=0)toast.style.display='none';P.atk=Math.max(0,P.atk-dt);P.skill=Math.max(0,P.skill-dt);P.dash=Math.max(0,P.dash-dt);if(mode=='field'){let spd=150,dx=(keys.ArrowRight||keys.d?1:0)-(keys.ArrowLeft||keys.a?1:0),dy=(keys.ArrowDown||keys.s?1:0)-(keys.ArrowUp||keys.w?1:0);if(dx)P.face=Math.sign(dx);let l=Math.hypot(dx,dy)||1;P.x+=dx/l*spd*dt;P.y+=dy/l*spd*dt;clamp()}if(mode=='battle'&&B){let dx=(keys.ArrowRight||keys.d?1:0)-(keys.ArrowLeft||keys.a?1:0),dy=(keys.ArrowDown||keys.s?1:0)-(keys.ArrowUp||keys.w?1:0),l=Math.hypot(dx,dy)||1;P.x+=dx/l*170*dt;P.y+=dy/l*170*dt;clamp();P.ki=Math.min(P.maxKi,P.ki+dt*4);B.cd-=dt;let vx=P.x-B.ex,vy=P.y-B.ey,dl=Math.hypot(vx,vy)||1;B.ex+=vx/dl*(B.boss?82:65)*dt;B.ey+=vy/dl*(B.boss?82:65)*dt;if(B.cd<=0){B.cd=B.boss?.9:1.35;B.shots.push({x:B.ex,y:B.ey,vx:vx/dl*(B.boss?190:135),vy:vy/dl*(B.boss?190:135),r:B.boss?11:8})}B.shots.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;if(Math.hypot(P.x-s.x,P.y-s.y)<s.r+14){P.hp-=B.boss?13:8;s.dead=1;B.fx.push({x:P.x,y:P.y,r:26,t:.2,c:'#9b5955'});if(P.hp<=0){P.hp=P.max;P.ki=P.maxKi;mode='field';pop('쓰러졌다. 주막에서 다시 일어났다.');map='village';P.x=120;P.y=310;B=null}}});if(B)B.shots=B.shots.filter(s=>!s.dead&&s.x>-20&&s.x<740&&s.y>-20&&s.y<500);if(B)B.fx.forEach(f=>f.t-=dt);if(B)B.fx=B.fx.filter(f=>f.t>0)}}function paper(){let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#d6bc82');g.addColorStop(1,maps[map].bg);x.fillStyle=g;x.fillRect(0,0,W,H);x.globalAlpha=.18;for(let i=0;i<80;i++){x.fillStyle=i%2?'#6e5334':'#f2dfb5';x.fillRect((i*83)%720,(i*47)%480,1+(i%3),1)}x.globalAlpha=1}function cutRect(a,b,w,h,col){x.fillStyle='#2a1a10';x.fillRect(a+3,b+4,w,h);x.fillStyle=col;x.fillRect(a,b,w,h);x.strokeStyle='#2b1a10';x.lineWidth=2;x.strokeRect(a,b,w,h)}function drawPlayer(px=P.x,py=P.y){x.fillStyle='#2b1a10';x.fillRect(px-16,py-27,32,10);x.fillStyle='#d9bc7b';x.fillRect(px-22,py-33,44,9);x.fillStyle='#4b3726';x.fillRect(px-10,py-22,20,30);x.fillStyle='#e5c998';x.fillRect(px-7,py-28,14,12);x.fillStyle='#27170f';x.fillRect(px+14,py-18,5,30);if(P.atk>0){x.strokeStyle='#f6e1a2';x.lineWidth=5;x.beginPath();x.arc(px+P.face*36,py-10,58,-.8,.9);x.stroke()}}function drawMonster(o){let n=o.n,px=o.x,py=o.y;x.save();if(o.hit){x.globalAlpha=.55}x.fillStyle='#17120e';x.strokeStyle='#2b1a10';x.lineWidth=2;if(n.includes('강철')){x.fillRect(px-58,py-12,116,24);x.fillStyle='#efe2c0';x.fillRect(px+38,py-28,32,30);x.fillStyle='#8a3430';x.fillRect(px-45,py-20,20,8);x.fillRect(px-10,py+16,80,8)}else if(n.includes('나방')||n.includes('벌')){x.beginPath();x.moveTo(px,py);x.lineTo(px-42,py-28);x.lineTo(px-18,py+24);x.lineTo(px,py);x.lineTo(px+42,py-28);x.lineTo(px+18,py+24);x.closePath();x.fill();x.fillStyle='#efe2c0';x.fillRect(px-10,py-18,20,18)}else if(n.includes('사슴')){x.fillRect(px-35,py-8,70,18);x.fillStyle='#efe2c0';x.fillRect(px+20,py-25,22,24);x.strokeStyle='#2b1a10';x.beginPath();x.moveTo(px+32,py-25);x.lineTo(px+50,py-48);x.moveTo(px+32,py-25);x.lineTo(px+15,py-48);x.stroke()}else if(n.includes('지네')||n.includes('살무사')){for(let i=0;i<6;i++){x.fillRect(px-48+i*17,py+Math.sin(i)*5,15,13)}x.fillStyle='#efe2c0';x.fillRect(px+42,py-10,18,18)}else{x.fillRect(px-30,py-12,60,24);x.fillStyle='#efe2c0';x.fillRect(px+16,py-22,22,24)}x.fillStyle='#5d1f1f';x.fillRect(px+5,py-3,5,5);x.restore()}function draw(){paper();let mp=maps[map];mp.exits.forEach(e=>cutRect(e.x,e.y,e.w,e.h,'#8b6845'));mp.objs.forEach(o=>{cutRect(o.x-25,o.y-25,50,46,'#7c5838');x.fillStyle='#ead8b9';x.fillText(o.n,o.x-28,o.y-34)});for(let i=0;i<10;i++){cutRect(35+i*68,70+(i%3)*92,42,28,i%2?'#79583a':'#a67e50')}if(mode=='field'){(alive[map]||[]).forEach(drawMonster);drawPlayer()}if(mode=='battle'&&B){x.fillStyle='rgba(38,25,14,.72)';x.fillRect(20,55,680,380);x.strokeStyle='#785a39';x.strokeRect(20,55,680,380);drawMonster({n:B.e.n,x:B.ex,y:B.ey,hit:B.hit});drawPlayer();B.shots.forEach(s=>{x.fillStyle='#6b2b25';x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fill()});B.fx.forEach(f=>{x.globalAlpha=Math.max(0,f.t*2);x.strokeStyle=f.c;x.lineWidth=4;x.beginPath();x.arc(f.x,f.y,f.r*(1-f.t),0,7);x.stroke();x.globalAlpha=1});x.fillStyle='#ead8b9';x.fillText(B.e.n+' HP '+Math.max(0,Math.floor(B.e.hp)),32,78);x.fillText('진정 '+Math.floor(B.calm||0)+' / 100',32,96)}drawUI();drawMini()}function drawUI(){hud.innerHTML=`<b>${maps[map].name}</b><br>HP ${Math.floor(P.hp)}/${P.max}<div class=bar><i style="width:${P.hp/P.max*100}%"></i></div>기력 ${Math.floor(P.ki)}/${P.maxKi}<div class=bar><i style="width:${P.ki/P.maxKi*100}%"></i></div>Lv.${P.lv} · 엽전 ${P.coin} · 그물 ${P.cap}`;hint.innerHTML=mode=='battle'?'Q 공격<br>E 시조<br>R 포획<br>Space 회피':'Space 대쉬+상호작용<br>Enter/Z 상호작용<br>붉은 환수와 접촉하면 전투';quest.innerHTML=`현재 지역: ${maps[map].name}<br>목표: 동쪽과 북쪽 길을 지나 강철 폐제련소의 보스 <b>강철이</b>를 처리하라.`;book.innerHTML=P.book.length?P.book.slice(-12).join('<br>'):'아직 기록된 환수가 없습니다.'}function drawMini(){mx.clearRect(0,0,224,152);mx.fillStyle='#2c2118';mx.fillRect(0,0,224,152);mx.fillStyle='#ead8b9';mx.fillRect(P.x/720*224-2,P.y/480*152-2,4,4);mx.fillStyle='#a8423a';(alive[map]||[]).forEach(o=>mx.fillRect(o.x/720*224-2,o.y/480*152-2,4,4));mx.fillStyle='#6d8766';maps[map].exits.forEach(e=>mx.fillRect((e.x+e.w/2)/720*224-2,(e.y+e.h/2)/480*152-2,5,5));mx.strokeStyle='#8b6845';mx.strokeRect(0,0,224,152)}function loop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;update(dt);draw();requestAnimationFrame(loop)}addEventListener('keydown',e=>{keys[e.key]=true;let k=e.key.toLowerCase();if(mode=='dialog'&&['enter',' ','z'].includes(k)){let b=ops.querySelector('button');if(b)b.click()}else if(mode=='field'&&k==' '){dash();interact()}else if(mode=='field'&&(k=='enter'||k=='z'))interact();else if(mode=='battle'){if(k=='q')atk();if(k=='e')skill();if(k=='r')cap();if(k==' ')dash();if(k=='escape'){mode='field';B=null;pop('전투에서 물러났다')}}});addEventListener('keyup',e=>keys[e.key]=false);say('김삿갓','한지로 덧댄 조선의 길 위에 환수들이 출몰한다.\n북쪽 들길을 지나 월영나루, 비전죽림, 적동광산, 강철 폐제련소로 향하라.',[['시작',()=>{mode='field';dia.style.display='none'}]]);requestAnimationFrame(loop)})();</script></body></html>
